name: Build AutoEq resource pack and publish release

on:
  schedule:
    - cron: "17 2 1 * *" # monthly on 1st, UTC ~2:17am
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: autoeq-release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch AutoEq
        run: |
          git clone --depth=1 --filter=blob:none --sparse \
            https://github.com/jaakkopasanen/AutoEq.git "$RUNNER_TEMP/AutoEq"
          cd "$RUNNER_TEMP/AutoEq"
          git sparse-checkout set --no-cone \
            "results/" \
            "README.md"

      - name: Build static AutoEq data
        run: |
          python scripts/build_autoeq_static.py \
            --autoeq "$RUNNER_TEMP/AutoEq" \
            --out dist \
            --include-csv \
            --exclude-wav \
            --exclude-png

      - name: Record AutoEq commit SHA
        run: |
          SHA=$(git -C "$RUNNER_TEMP/AutoEq" rev-parse HEAD)
          echo "Updating meta.json with AutoEq commit: ${SHA:0:12}"
          python3 -c "
          import json
          meta_path = 'dist/data/meta.json'
          with open(meta_path) as f:
              meta = json.load(f)
          meta['autoeq_commit'] = '${SHA:0:12}'
          with open(meta_path, 'w') as f:
              json.dump(meta, f, indent=2, ensure_ascii=False)
          "

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Merge frontend into dist
        run: |
          # Remove mock data from frontend build so it won't overwrite real data
          rm -rf web/dist/data
          # Copy frontend build output into dist (data dir already populated by transformer)
          cp -R web/dist/* dist/

      - name: Guard resource pack size
        run: |
          SIZE=$(du -sm dist | cut -f1)
          echo "Resource pack size: ${SIZE} MiB"
          if [ "$SIZE" -ge 2000 ]; then
            echo "ERROR: Resource pack size ${SIZE} MiB exceeds 2000 MiB limit"
            exit 1
          fi
          echo "Size check passed (${SIZE} MiB < 2000 MiB)"

      - name: Package resource pack
        run: |
          TAG="autoeq-$(date -u +%Y-%m)"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          zip -r "${TAG}.zip" dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, updating asset."
            gh release upload "$TAG" "${TAG}.zip" --clobber
          else
            gh release create "$TAG" "${TAG}.zip" \
              --title "AutoEq 资源包 $TAG" \
              --notes "每月自动构建的 AutoEq 资源包，包含静态数据与前端产物。"
          fi
