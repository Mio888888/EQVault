name: Sync AutoEq and deploy Pages

on:
  schedule:
    - cron: "17 2 * * *" # daily UTC ~2:17am
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-autoeq
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch AutoEq
        run: |
          git clone --depth=1 --filter=blob:none --sparse \
            https://github.com/jaakkopasanen/AutoEq.git "$RUNNER_TEMP/AutoEq"
          cd "$RUNNER_TEMP/AutoEq"
          git sparse-checkout set --no-cone \
            "results/" \
            "README.md"

      - name: Build static AutoEq data
        run: |
          python scripts/build_autoeq_static.py \
            --autoeq "$RUNNER_TEMP/AutoEq" \
            --out dist \
            --include-csv \
            --exclude-wav \
            --exclude-png

      - name: Record AutoEq commit SHA
        run: |
          SHA=$(git -C "$RUNNER_TEMP/AutoEq" rev-parse HEAD)
          echo "Updating meta.json with AutoEq commit: ${SHA:0:12}"
          python3 -c "
          import json
          meta_path = 'dist/data/meta.json'
          with open(meta_path) as f:
              meta = json.load(f)
          meta['autoeq_commit'] = '${SHA:0:12}'
          with open(meta_path, 'w') as f:
              json.dump(meta, f, indent=2, ensure_ascii=False)
          "

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Merge frontend into dist
        run: |
          # Remove mock data from frontend build so it won't overwrite real data
          rm -rf web/dist/data
          # Copy frontend build output into dist (data dir already populated by transformer)
          cp -R web/dist/* dist/

      - name: Guard Pages artifact size
        run: |
          SIZE=$(du -sm dist | cut -f1)
          echo "Artifact size: ${SIZE} MiB"
          if [ "$SIZE" -ge 900 ]; then
            echo "ERROR: Artifact size ${SIZE} MiB exceeds 900 MiB limit"
            exit 1
          fi
          echo "Size check passed (${SIZE} MiB < 900 MiB)"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
